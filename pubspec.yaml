name: fixify
description: Fixify - On-demand home repair professionals platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  shared_preferences: ^2.0.17

  # Utils
  get_it: ^7.7.0
  dartz: ^0.10.1
  rxdart: ^0.27.7

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # Image Picker
  image_picker: ^1.0.7

  # Google Maps API
  google_maps_flutter: ^2.5.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # URL Launcher - GOOGLE MAPS APPLICATION
  url_launcher: ^6.3.0

  # ShowCaseView - APP TUTORIAL
  showcaseview: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_svg: ^2.0.9

flutter_icons:
  android: true
  ios: true
  image_path: "lib/assets/images/logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
